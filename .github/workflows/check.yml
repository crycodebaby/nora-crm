name: ✅ Check
on:
    push:
        branches:
            - main
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    eslint:
        name: ESLint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: ⚙️ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🔬 ESLint
              run: npm run lint

    prettier:
        name: Prettier
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: ⚙️ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🎨 Prettier
              run: npm run prettier

    typecheck:
        name: 🏷️ Typecheck
        timeout-minutes: 10
        runs-on: ubuntu-latest
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: ⚙️ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🏷️ Typecheck
              run: npm run typecheck

    test-app:
        name: 🔎 Test
        runs-on: ubuntu-latest
        timeout-minutes: 10
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: ⚙️ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🎭 Install Playwright browsers
              run: npx playwright install chromium-headless-shell 1>/dev/null

            - name: 🔎 Unit Tests on App
              run: CI=1 npm run test:unit:app -- --run
            - name: 🔎 Unit Tests on Supabase functions
              run: CI=1 npm run test:unit:functions -- --run

    e2e-test:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: ⚙️ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Read Playwright version
              id: playwright-version
              run: echo "version=$(node -p 'require("./package-lock.json").packages["node_modules/playwright-core"].version')" >> "$GITHUB_OUTPUT"

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-chromium-headless-shell

            - name: Install Playwright browser and system dependencies
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium-headless-shell 1>/dev/null

            - name: Install Playwright system dependencies
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps chromium-headless-shell 1>/dev/null

            - name: Install wait-on and serve
              run: npm install -g wait-on serve

            - name: Run Playwright tests
              run: make test-e2e-ci

            - name: Upload Playwright failure artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-failure-${{ github.run_id }}
                  path: |
                      test-results/
                      playwright-report/
                  if-no-files-found: warn
                  retention-days: 7

            - name: Upload Supabase start logs
              if: failure() || cancelled()
              uses: actions/upload-artifact@v4
              with:
                  name: supabase-start-logs-${{ github.run_id }}
                  path: /tmp/atomic-crm-supabase-e2e.log
                  if-no-files-found: warn
                  retention-days: 7

    build:
        name: 🔨 Build
        timeout-minutes: 10
        runs-on: ubuntu-latest
        if: ${{ !github.event.pull_request.draft || github.event_name == 'push' }}
        steps:
            - name: 📥 Checkout repo
              uses: actions/checkout@v4

            - name: ⚙️ Setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: 📥 Download deps
              run: npm ci

            - name: 🔨 Build
              run: npm run build
